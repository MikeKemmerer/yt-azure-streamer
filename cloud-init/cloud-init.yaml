#cloud-config
# Reference: this is what the ARM template customData produces.
# The ARM template injects namePrefix and resourceGroup via concat().

package_update: true
package_upgrade: true

packages:
  - git

write_files:
  - path: /etc/nameprefix
    content: "REPLACED_BY_ARM_TEMPLATE"
  - path: /etc/resourcegroup
    content: "REPLACED_BY_ARM_TEMPLATE"

runcmd:
  - git clone REPO_URL_FROM_ARM_PARAMETER /opt/yt
  - bash /opt/yt/install/install-services.sh
