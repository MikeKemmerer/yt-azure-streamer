#cloud-config
# Reference: this is what the ARM template customData produces.
# The ARM template injects namePrefix, resourceGroup, and customDomain via concat().

package_update: true
package_upgrade: true

packages:
  - git

write_files:
  - path: /etc/yt/nameprefix
    content: "REPLACED_BY_ARM_TEMPLATE"
  - path: /etc/yt/resourcegroup
    content: "REPLACED_BY_ARM_TEMPLATE"
  - path: /etc/yt/customdomain
    content: "REPLACED_BY_ARM_TEMPLATE_OR_EMPTY"

runcmd:
  - git clone REPO_URL_FROM_ARM_PARAMETER /opt/yt
  - bash /opt/yt/install/install-services.sh
